name: Upload sourcemaps to Bugsnag
description: "Upload JS sourcemaps to Bugsnag, resolving the base URL from setup.json"

inputs:
  API_KEY:
    description: "Bugsnag API key"
    required: true
  APP_VERSION:
    description: "App version to associate sourcemaps with"
    required: true
  ENVIRONMENT:
    description: "Target environment (staging, production, qa)"
    required: true
  SOURCE_MAPS_PATH:
    description: "Path to the directory containing .js.map files"
    required: true
  PUBLIC_PATH:
    description: "Public path appended to the base URL (e.g. wp-content/themes/redesign/public)"
    required: true
  SETUP_JSON_PATH:
    description: "Path to setup.json relative to the repo root"
    required: false
    default: "setup.json"

runs:
  using: composite
  steps:
    - name: Upload sourcemaps
      shell: bash
      env:
        BUGSNAG_API_KEY: ${{ inputs.API_KEY }}
        APP_VERSION: ${{ inputs.APP_VERSION }}
        ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
        SOURCE_MAPS_PATH: ${{ inputs.SOURCE_MAPS_PATH }}
        PUBLIC_PATH: ${{ inputs.PUBLIC_PATH }}
        SETUP_JSON_PATH: ${{ inputs.SETUP_JSON_PATH }}
      run: |
        APP_URL=$(jq -r --arg env "$ENVIRONMENT" '.urls[$env] // empty' "$SETUP_JSON_PATH")
        if [ -z "$APP_URL" ]; then
          echo "No URL configured for '$ENVIRONMENT' in $SETUP_JSON_PATH, skipping."
          exit 0
        fi
        BASE_URL="$APP_URL/$PUBLIC_PATH"
        for map in "$SOURCE_MAPS_PATH"/*.js.map; do
          bundle="${map%.map}"
          filename=$(basename "$bundle")
          npx --yes @bugsnag/source-maps@^2.3.0 upload-browser \
            --api-key "$BUGSNAG_API_KEY" \
            --app-version "$APP_VERSION" \
            --source-map "$map" \
            --bundle "$bundle" \
            --bundle-url "$BASE_URL/$filename"
        done
